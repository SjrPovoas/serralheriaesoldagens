backend:
  name: github
  repo: SjrPovoas/serralheriaesoldagens
  branch: main
  auth_type: pkce
  client_id: Ov23liFqMrisc0vP3FQe

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "portfolio"
    label: "Portfólio"
    files:
      - file: "portfolio-data.json"
        label: "Lista de Projetos"
        name: "portfolio"
        fields:
          - label: "Projetos"
            name: "projetos"
            widget: "list"
            fields:
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Categoria", name: "categoria", widget: "select", options: ["portoes", "grades", "pergolados", "estruturas"]}
              - {label: "Imagem", name: "image", widget: "image"}